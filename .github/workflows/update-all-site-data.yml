name: Update All Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Taipei"
    - cron: "45 13 * * *"
      timezone: "Asia/Taipei"
    - cron: "30 17 * * *"
      timezone: "Asia/Taipei"
    - cron: "0 23 * * *"
      timezone: "Asia/Taipei"

permissions:
  contents: write

concurrency:
  group: asurada-update-all-site-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install requests

      - name: Update all site data
        run: python scripts/update_all_site_data.py

      - name: Validate generated data
        run: python scripts/validate_site_data.py --strict

      - name: Commit and push generated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          paths=(
            "docs/data"
            "data/*.json"
            "data/processed"
            "data/latest"
            "data/scorecards"
            "data/config"
            "data/history"
          )
          for path in "${paths[@]}"; do
            if compgen -G "$path" > /dev/null; then
              git add $path
            elif [ -e "$path" ]; then
              git add "$path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: unified full-site update"
            git push origin main
          fi
