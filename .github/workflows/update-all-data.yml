name: Update all stock radar data

on:
  workflow_dispatch:
  schedule:
    # Asia/Taipei 08:30, 15:20, 16:10, 20:30
    - cron: "30 0 * * 1-5"
    - cron: "20 7 * * 1-5"
    - cron: "10 8 * * 1-5"
    - cron: "30 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-all-data
  cancel-in-progress: false

jobs:
  update-all-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install requests

      - name: Run unified data refresh
        run: python scripts/update_all_data.py

      - name: Commit unified data changes
        shell: bash
        run: |
          paths=(
            "data/processed/*.json"
            "data/latest/*.json"
            "data/scorecards/*.json"
            "data/config/*.json"
            "docs/data/*.json"
            "docs/data/processed/*.json"
          )

          staged_any=false
          for pattern in "${paths[@]}"; do
            for file in $pattern; do
              if [ -e "$file" ]; then
                git add "$file"
                staged_any=true
              fi
            done
          done

          if [ "$staged_any" = false ] || git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update all stock radar data"
          git push origin main
