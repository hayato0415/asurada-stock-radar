name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update All Site Data
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp -v *.html _site/
          cp -v .nojekyll _site/
          cp -R assets _site/assets
          mkdir -p _site/data
          cp -R docs/data/. _site/data/
          if [ -d data/processed ]; then
            mkdir -p _site/data/processed
            cp -R data/processed/. _site/data/processed/
          fi
          if [ -d docs/data/processed ]; then
            mkdir -p _site/data/processed
            cp -R docs/data/processed/. _site/data/processed/
          fi

          test -f _site/radar.html
          test -f _site/data-status.html
          test -f _site/assets/js/radar-page.js
          test -f _site/assets/js/data-status-page.js
          test -f _site/data/site_meta.json
          test -f _site/data/data_status.json
          test -f _site/data/radar.json
          test -f _site/data/update_status.json
          test -f _site/data/processed/stocks_master.json
          test -f _site/data/processed/ai_scores_daily.json
          test -f _site/data/processed/stock_metrics_daily.json
          test -f _site/data/processed/factor-scores.json
          test -f _site/data/processed/ai-top10-daily.json
          test -f _site/data/processed/ai-top10-history.json
          test -f _site/data/processed/ai-persistence-weekly.json
          test -f _site/data/processed/ai-persistence-monthly.json
          test -f _site/data/processed/ai-validation-detail.json
          test -f _site/data/processed/ai-validation-summary.json
          test -f _site/data/processed/ai-validation-portfolio.json
          test -f _site/data/processed/ai-factor-performance.json
          test -f _site/data/processed/ai-validation-status.json

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
