name: Legacy Daily Radar Full Site Update

on:
  # Legacy manual-only workflow. The scheduled data update is now
  # .github/workflows/full-site-update.yml so all pages share one build_id.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-radar-update
  cancel-in-progress: false

env:
  TZ: Asia/Taipei

jobs:
  update-latest-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Full site update
        run: python scripts/update_all.py --mode full

      - name: Commit latest data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No latest data changes to commit."
          else
            git commit -m "Update full site data"
            git push
          fi
