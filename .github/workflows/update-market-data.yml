name: Update full-market stock data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install requests

      - name: Build processed data
        run: python scripts/update_full_market_data.py

      - name: Build AI scorecards
        run: python scripts/build_ai_scorecards.py

      - name: Validate AI scoring
        run: python scripts/validate_ai_scoring.py

      - name: Commit processed data changes
        run: |
          if git diff --quiet -- data/processed data/latest data/scorecards data/config; then
            echo "No processed data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.json data/latest/*.json data/scorecards/*.json data/config/*.json
          git commit -m "Update full-market stock radar data"
          git push
