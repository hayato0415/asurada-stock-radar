name: Update full-market stock data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 10 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install requests

      - name: Build processed data
        run: python scripts/update_full_market_data.py

      - name: Commit processed data changes
        run: |
          if git diff --quiet -- data/processed; then
            echo "No processed data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.json
          git commit -m "Update full-market stock and theme rotation data"
          git push
