name: Update radar close data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Update radar data
        run: python scripts/update_radar.py

      - name: Commit radar data changes
        run: |
          if git diff --quiet -- docs/data/radar.json docs/data/update_status.json; then
            echo "No radar data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/radar.json docs/data/update_status.json
          git commit -m "Update radar close data"
          git push
