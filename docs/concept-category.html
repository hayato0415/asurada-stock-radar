<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoneyDJ 概念股分類搜尋</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .combo-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 420px;
      overflow: auto;
    }
    .combo-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      padding: 12px 14px;
      text-align: left;
    }
    .combo-item:hover,
    .combo-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15, 76, 129, .12);
    }
    .concept-detail {
      display: grid;
      gap: 10px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>MoneyDJ 概念股分類搜尋</h1>
    <p>本頁讀取本機產生的 MoneyDJ 概念分類 CSV，提供可搜尋下拉選單。GitHub Pages 前端只讀資料，不寫回 GitHub。</p>
    <nav class="nav">
      <a href="index.html">首頁</a>
      <a href="radar.html">全股雷達</a>
      <a href="concepts.html">概念股資料庫</a>
      <a class="active" href="concept-category.html">MoneyDJ 概念分類</a>
      <a href="stock.html">個股查詢</a>
    </nav>
  </header>

  <main class="page">
    <section class="panel">
      <div class="section-title">
        <h2>可搜尋下拉選單</h2>
        <span id="categoryCount">資料載入中...</span>
      </div>
      <div class="filters">
        <label>輸入關鍵字快速搜尋
          <input id="categorySearch" placeholder="例如 AI、Apple、PCB、cowos、lidar、眼鏡">
        </label>
      </div>
      <div id="categoryList" class="combo-list"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>選取概念分類</h2>
        <span id="selectedStatus">尚未選取</span>
      </div>
      <div id="categoryDetail" class="concept-detail">
        <div class="empty">請先搜尋或點選一個 MoneyDJ 概念分類。</div>
      </div>
    </section>
  </main>

  <p class="footer-note">資料來源：MoneyDJ。此頁僅顯示概念分類名稱與來源連結，不處理每日行情、成交量、月營收或雷達分數。</p>

  <script>
    const CSV_PATH = "data/moneydj_concept_categories.csv";
    const MAX_VISIBLE = 80;
    let categories = [];
    let selected = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function normalizeText(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function extraSearchText(name) {
      const text = normalizeText(name);
      const extras = [];
      if (/pcb|hdi|ic基板|基板|載板/.test(text)) extras.push("pcb hdi ic基板 載板");
      if (/apple|vision|iphone|ipad|macbook/.test(text)) extras.push("apple vision iphone ipad macbook");
      if (/ai|智慧|眼鏡/.test(text)) extras.push("ai 智慧眼鏡 ai眼鏡");
      return extras.join(" ");
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      const cleaned = String(text || "").replace(/^\uFEFF/, "");
      for (let i = 0; i < cleaned.length; i += 1) {
        const char = cleaned[i];
        const next = cleaned[i + 1];
        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some((value) => value.trim())) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      if (cell || row.length) {
        row.push(cell);
        if (row.some((value) => value.trim())) rows.push(row);
      }
      if (!rows.length) return [];
      const headers = rows.shift().map((header) => header.trim());
      return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] || ""])));
    }

    function matchesCategory(category, query) {
      if (!query) return true;
      const target = normalizeText([
        category.concept_code,
        category.concept_name,
        category.source,
        extraSearchText(category.concept_name),
      ].join(" "));
      const q = normalizeText(query);
      return target.includes(q);
    }

    function renderList() {
      const query = document.querySelector("#categorySearch").value.trim();
      const filtered = categories.filter((category) => matchesCategory(category, query));
      const visible = filtered.slice(0, MAX_VISIBLE);
      document.querySelector("#categoryCount").textContent = `共 ${categories.length} 類，顯示 ${visible.length} 類`;
      document.querySelector("#categoryList").innerHTML = visible.length
        ? visible.map((category) => `
            <button class="combo-item ${selected?.concept_code === category.concept_code ? "active" : ""}" data-code="${escapeHtml(category.concept_code)}">
              <strong>${escapeHtml(category.concept_name)}</strong>
              <span class="muted"> ${escapeHtml(category.concept_code)}</span>
            </button>
          `).join("")
        : `<div class="empty">找不到符合關鍵字的 MoneyDJ 概念分類。</div>`;
      document.querySelectorAll(".combo-item").forEach((button) => {
        button.addEventListener("click", () => {
          selected = categories.find((category) => category.concept_code === button.dataset.code);
          renderList();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      if (!selected) {
        document.querySelector("#selectedStatus").textContent = "尚未選取";
        document.querySelector("#categoryDetail").innerHTML = `<div class="empty">請先搜尋或點選一個 MoneyDJ 概念分類。</div>`;
        return;
      }
      document.querySelector("#selectedStatus").textContent = selected.concept_name;
      document.querySelector("#categoryDetail").innerHTML = `
        <div class="table-wrap">
          <table>
            <tbody>
              <tr><th>concept_name</th><td>${escapeHtml(selected.concept_name)}</td></tr>
              <tr><th>concept_code</th><td>${escapeHtml(selected.concept_code)}</td></tr>
              <tr><th>source</th><td>${escapeHtml(selected.source)}</td></tr>
              <tr><th>source_url</th><td><a class="stock-link" href="${escapeHtml(selected.source_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(selected.source_url)}</a></td></tr>
              <tr><th>updated_at</th><td>${escapeHtml(selected.updated_at)}</td></tr>
            </tbody>
          </table>
        </div>
      `;
    }

    async function boot() {
      try {
        const response = await fetch(CSV_PATH, { cache: "no-store" });
        if (!response.ok) throw new Error(`讀取 CSV 失敗：${response.status}`);
        categories = parseCsv(await response.text()).filter((row) => row.concept_code && row.concept_name);
        renderList();
        renderDetail();
      } catch (error) {
        document.querySelector("#categoryCount").textContent = "資料讀取失敗";
        document.querySelector("#categoryList").innerHTML = `<div class="error">${escapeHtml(error.message || error)}</div>`;
      }
    }

    document.querySelector("#categorySearch").addEventListener("input", renderList);
    boot();
  </script>
</body>
</html>
